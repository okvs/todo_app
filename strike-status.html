<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쟁의 참여 현황</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* Header */
    .page-title {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 28px;
      letter-spacing: -0.5px;
    }

    /* Summary Card */
    .summary-card {
      background: linear-gradient(135deg, #1a1a2e 0%, #2d2d5e 100%);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
      text-align: center;
      color: #fff;
      box-shadow: 0 4px 24px rgba(26, 26, 46, 0.15);
    }

    .summary-label {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .summary-percent {
      font-size: 56px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .summary-percent .unit {
      font-size: 28px;
      font-weight: 600;
    }

    .summary-detail {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.8);
      display: flex;
      justify-content: center;
      gap: 24px;
    }

    .summary-detail span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .summary-detail .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.participate {
      background: #4ecdc4;
    }

    .dot.total {
      background: rgba(255, 255, 255, 0.4);
    }

    /* Section Card */
    .section-card {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: #4ecdc4;
      border-radius: 2px;
    }

    /* Chart */
    .chart-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .chart-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chart-label {
      flex: 0 0 160px;
      text-align: right;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chart-bar-wrap {
      flex: 1;
      height: 32px;
      background: #f0f2f5;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .chart-bar {
      height: 100%;
      border-radius: 8px;
      transition: width 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      min-width: 2px;
      position: relative;
    }

    .chart-value {
      flex: 0 0 54px;
      font-size: 14px;
      font-weight: 700;
      color: #1a1a2e;
      text-align: right;
    }

    /* Bar colors */
    .bar-normal {
      background: linear-gradient(90deg, #4ecdc4, #44b3ab);
    }

    .bar-danger {
      background: linear-gradient(90deg, #e74c3c, #c0392b);
    }

    .no-data-msg {
      text-align: center;
      color: #aaa;
      padding: 32px 0;
      font-size: 14px;
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead th {
      background: #f7f8fa;
      padding: 12px 14px;
      text-align: center;
      font-weight: 700;
      color: #555;
      border-bottom: 2px solid #e0e0e0;
      white-space: nowrap;
    }

    thead th.sortable {
      cursor: pointer;
      user-select: none;
      position: relative;
      padding-right: 22px;
      transition: background 0.15s;
    }

    thead th.sortable:hover {
      background: #eef0f3;
    }

    thead th.sortable::after {
      content: '\21C5';
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #bbb;
    }

    thead th.sortable.asc::after {
      content: '\25B2';
      color: #4ecdc4;
    }

    thead th.sortable.desc::after {
      content: '\25BC';
      color: #4ecdc4;
    }

    tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid #eee;
      text-align: center;
      vertical-align: middle;
    }

    tbody tr:hover {
      background: #f9fafb;
    }

    table input[type="text"],
    table input[type="number"] {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      text-align: center;
      transition: border-color 0.2s;
      background: #fff;
    }

    table input:focus {
      outline: none;
      border-color: #4ecdc4;
      box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.15);
    }

    .col-division {
      width: 16%;
    }

    .col-dept {
      width: 16%;
    }

    .col-total {
      width: 12%;
    }

    .col-part {
      width: 12%;
    }

    .col-note {
      width: 32%;
    }

    .col-del {
      width: 12%;
    }

    .btn-delete {
      background: none;
      border: 1px solid #e74c3c;
      color: #e74c3c;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-delete:hover {
      background: #e74c3c;
      color: #fff;
    }

    /* Action Buttons */
    .action-bar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-add {
      background: #f0f2f5;
      color: #1a1a2e;
    }

    .btn-add:hover {
      background: #e2e4e8;
    }

    .btn-save {
      background: linear-gradient(135deg, #4ecdc4 0%, #44b3ab 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(78, 205, 196, 0.3);
    }

    .btn-save:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(78, 205, 196, 0.4);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e;
      color: #fff;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1 class="page-title">쟁의 참여 현황</h1>

    <!-- Summary -->
    <div class="summary-card">
      <div class="summary-label">취합된 부서 전체 참여율</div>
      <div class="summary-percent" id="summaryPercent">0<span class="unit">%</span></div>
      <div class="summary-detail">
        <span><span class="dot participate"></span>참여인원: <b id="summaryPart">0</b>명</span>
        <span><span class="dot total"></span>총인원: <b id="summaryTotal">0</b>명</span>
      </div>
    </div>

    <!-- Chart -->
    <div class="section-card">
      <div class="section-title">부서별 쟁의 참여율 (4/23)</div>
      <div class="chart-container" id="chartContainer">
        <div class="no-data-msg">아래 테이블에 데이터를 입력한 후 저장하면 그래프가 표시됩니다.</div>
      </div>
    </div>

    <!-- Data Entry Table -->
    <div class="section-card">
      <div class="section-title">부서별 쟁의 현황 취합</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-division sortable" data-col="0" data-type="text">사업부
              </th>
              <th class="col-dept sortable" data-col="1" data-type="text">부서</th>
              <th class="col-total sortable" data-col="2" data-type="number">총인원
              </th>
              <th class="col-part sortable" data-col="3" data-type="number">참여인원
              </th>
              <th class="col-note">특이사항</th>
              <th class="col-del">삭제</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="action-bar">
        <button class="btn btn-add" id="btnAdd">+ 행 추가</button>
        <button class="btn btn-save" id="btnSave">저장</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <noscript>
    <div style="text-align:center;padding:40px;color:#e74c3c;font-size:18px;">
      이 페이지는 JavaScript가 필요합니다. 브라우저 설정에서 JavaScript를 활성화해주세요.
    </div>
  </noscript>

  <script src="app.js"></script>
</body>

</html>
